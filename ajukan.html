<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajukan Event - RelawanKita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            /* Tambahan wajib agar transisi pudar jalan */
            opacity: 0; 
            transition: opacity 0.4s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50">
    
    <nav class="bg-white shadow-sm h-20 flex items-center sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <div class="flex items-center cursor-pointer group" onclick="window.location.href='index.html'">
                <div class="bg-blue-600 p-2 rounded-lg mr-2 group-hover:bg-blue-700 transition shadow-md">
                    <i class="fas fa-hands-helping text-white text-xl"></i>
                </div>
                <span class="text-xl font-bold text-gray-900 tracking-tight">RelawanKita</span>
            </div>
            
            <a href="index.html" class="flex items-center gap-2 bg-blue-600 text-white px-5 py-2.5 rounded-full font-semibold hover:bg-blue-700 transition-all duration-300 shadow-lg hover:shadow-blue-200">
                <i class="fas fa-arrow-left text-sm"></i>
                <span>Kembali ke Beranda</span>
            </a>
        </div>
    </nav>

    <section class="py-12 px-4">
        <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-gradient-to-r from-blue-600 to-blue-800 py-10 px-8 text-white">
                <h1 class="text-3xl font-bold">Ajukan Kegiatan Relawan</h1>
                <p class="mt-2 text-blue-100 opacity-90">Bantu kami menghubungkan organisasi Anda dengan relawan hebat di seluruh Indonesia.</p>
            </div>
            
            <form class="p-8 space-y-6" id="submissionForm">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Nama Organisasi</label>
                        <input type="text" required placeholder="Contoh: Yayasan Peduli Hijau" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Nama Penanggung Jawab</label>
                        <input type="text" required placeholder="Nama Lengkap" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Judul Kegiatan Volunteer</label>
                    <input type="text" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Contoh: Aksi Bersih Pantai & Edukasi Mangrove">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Deskripsi Detail & Persyaratan</label>
                    <textarea rows="5" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Jelaskan apa saja tugas relawan, kriteria yang dibutuhkan, serta benefit yang didapatkan..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Unggah Poster Kegiatan</label>
                    <div class="mt-1 flex justify-center px-6 pt-8 pb-8 border-2 border-gray-300 border-dashed rounded-xl hover:border-blue-400 transition bg-gray-50 group">
                        <div class="space-y-2 text-center">
                            <i class="fas fa-cloud-upload-alt text-gray-400 text-4xl mb-2 group-hover:text-blue-500 transition"></i>
                            <div class="flex text-sm text-gray-600 justify-center">
                                <label class="relative cursor-pointer bg-white rounded-md font-bold text-blue-600 hover:text-blue-500 px-2 py-1 border border-blue-200">
                                    <span>Pilih File Gambar</span>
                                    <input type="file" class="sr-only" accept="image/*">
                                </label>
                            </div>
                            <p class="text-xs text-gray-500">PNG, JPG, JPEG (Maks. 5MB)</p>
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all duration-300 shadow-lg hover:shadow-blue-200 transform hover:-translate-y-1">
                        Kirim Pengajuan Sekarang
                    </button>
                    <p class="text-center text-xs text-gray-400 mt-4 italic">
                        *Admin akan meninjau pengajuan Anda dalam waktu 1x24 jam.
                    </p>
                </div>
            </form>
        </div>
    </section>

    <footer class="py-8 text-center text-gray-400 text-sm">
        <p>&copy; 2026 RelawanKita. Semua hak cipta dilindungi.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
